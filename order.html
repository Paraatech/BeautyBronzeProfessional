<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order Now | Beauty Bronze</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}
body{
background:#f8f8f8;
}
nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 8%;
background:#111;
}
.logo{
font-size:28px;
font-weight:bold;
color:#d4af37;
}
nav ul{
display:flex;
list-style:none;
gap:25px;
}
nav ul li a{
text-decoration:none;
color:white;
}
nav ul li a:hover{
color:#d4af37;
}
.container{
max-width:500px;
margin:60px auto;
background:white;
padding:30px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,.1);
}
h1{
text-align:center;
margin-bottom:20px;
}
input,textarea,select{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:8px;
}
button{
width:100%;
padding:12px;
background:#d4af37;
border:none;
font-size:18px;
border-radius:8px;
cursor:pointer;
}
button:hover{
background:#111;
color:white;
}
footer{
background:#111;
color:white;
text-align:center;
padding:20px;
margin-top:40px;
}
</style>
</head>
<body>

<nav>
<div class="logo">Beauty Bronze</div>
<ul>
<li><a href="index.html">Home</a></li>
<li><a href="shop.html">Shop</a></li>
<li><a href="about.html">About</a></li>
<li><a href="order.html">Order</a></li>
</ul>
</nav>

<div class="container">
<h1>Place Your Order</h1>

<input type="text" id="name" placeholder="Enter Name" required>
<input type="text" id="phone" placeholder="Enter Phone" required>
<textarea id="address" placeholder="Enter Address" required></textarea>

<select id="product">
<option>Banana Hair Mask</option>
<option>Botox Hair Treatment</option>
<option>Keratin Serum</option>
<option>Nanoplex Hair Mask</option>
</select>

<button onclick="submitOrder()">Order Now</button>
</div>

<footer>
<p>© 2026 Beauty Bronze Professional</p>
</footer>

<script>
function submitOrder(){

const orderData = {
name: document.getElementById("name").value,
phone: document.getElementById("phone").value,
address: document.getElementById("address").value,
product: document.getElementById("product").value
};

if(!orderData.name || !orderData.phone || !orderData.address){
alert("Please fill all details");
return;
}

fetch("https://beautybronze-backend.onrender.com/api/order",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify(orderData)
})
.then(res=>res.json())
.then(data=>{
alert("Order Placed Successfully ✅");

document.getElementById("name").value="";
document.getElementById("phone").value="";
document.getElementById("address").value="";
})
.catch(error=>{
alert("Error placing order ❌");
console.log(error);
});

}
</script>

</body>
</html>
