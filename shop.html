<title>Shop | Beauty Bronze</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}
body{
background:#f9f9f9;
}
nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 8%;
background:#111;
}
.logo{
font-size:28px;
font-weight:bold;
color:#d4af37;
}
nav ul{
display:flex;
list-style:none;
gap:25px;
}
nav ul li a{
text-decoration:none;
color:white;
}
nav ul li a:hover{
color:#d4af37;
}
.heading{
text-align:center;
padding:40px;
font-size:40px;
}
.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px;
padding:0 8% 60px;
}
.card{
background:white;
border-radius:12px;
overflow:hidden;
box-shadow:0 5px 15px rgba(0,0,0,.1);
transition:.3s;
}
.card:hover{
transform:translateY(-10px);
}
.card img{
width:100%;
height:250px;
object-fit:cover;
}
.card-content{
padding:20px;
text-align:center;
}
.btn{
display:inline-block;
margin-top:10px;
padding:10px 20px;
background:#d4af37;
color:black;
text-decoration:none;
border-radius:25px;
}
footer{
background:#111;
color:white;
text-align:center;
padding:20px;
}
</style>
</head>
